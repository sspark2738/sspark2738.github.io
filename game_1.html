<!DOCTYPE html><br><html lang="ko"><br><head><br>    <meta charset="UTF-8"><br>    <meta name="viewport" content="width=device-width, initial-scale=1.0"><br>    <title>텍스트 로그라이크</title><br>    <style><br>        body {<br>            background-color: #1a1a1a;<br>            color: #f0f0f0;<br>            font-family: 'Courier New', Courier, monospace;<br>            display: flex;<br>            justify-content: center;<br>            align-items: center;<br>            height: 100vh;<br>            margin: 0;<br>            flex-direction: column;<br>        }<br>        h1 {<br>            color: #ffa500;<br>        }<br>        #game-container {<br>            display: flex;<br>            gap: 20px;<br>        }<br>        /* 게임 맵 스타일 */<br>        #game-map {<br>            white-space: pre; /* 공백과 줄바꿈을 그대로 표시 */<br>            font-size: 20px;<br>            line-height: 1.1;<br>            background-color: #000;<br>            padding: 10px;<br>            border: 2px solid #555;<br>            border-radius: 5px;<br>        }<br>        /* 게임 정보 패널 스타일 */<br>        #info-panel {<br>            width: 250px;<br>            display: flex;<br>            flex-direction: column;<br>            gap: 15px;<br>        }<br>        .info-box {<br>            background-color: #2a2a2a;<br>            border: 1px solid #444;<br>            padding: 15px;<br>            border-radius: 5px;<br>        }<br>        .info-box h2 {<br>            margin-top: 0;<br>            color: #ffa500;<br>            font-size: 18px;<br>            border-bottom: 1px solid #555;<br>            padding-bottom: 5px;<br>        }<br>        #player-stats, #game-log {<br>            list-style: none;<br>            padding: 0;<br>            margin: 0;<br>        }<br>        #game-log li {<br>            font-size: 14px;<br>            opacity: 0.8;<br>            margin-bottom: 5px;<br>        }<br>    </style><br></head><br><body><br>    <h1>미니 로그라이크</h1><br>    <div id="game-container"><br>        <div id="game-map"></div><br>        <div id="info-panel"><br>            <div class="info-box"><br>                <h2>플레이어 정보</h2><br>                <ul id="player-stats"></ul><br>            </div><br>            <div class="info-box"><br>                <h2>게임 로그</h2><br>                <ul id="game-log"></ul><br>            </div><br>             <div class="info-box"><br>                <h2>조작법</h2><br>                <p><br>                    - 이동: 방향키 또는 WASD<br><br>                    - 목표: '>' 찾기<br>                </p><br>            </div><br>        </div><br>    </div><br><br>    <script><br>        // --- 게임 설정 ---<br>        const MAP_WIDTH = 40;<br>        const MAP_HEIGHT = 25;<br>        const ROOM_MAX_SIZE = 10;<br>        const ROOM_MIN_SIZE = 6;<br>        const MAX_ROOMS = 8;<br>        const MAX_ENEMIES_PER_ROOM = 2;<br><br>        // --- DOM 요소 가져오기 ---<br>        const mapDisplay = document.getElementById('game-map');<br>        const playerStatsDisplay = document.getElementById('player-stats');<br>        const gameLogDisplay = document.getElementById('game-log');<br><br>        // --- 게임 상태 변수 ---<br>        let map;<br>        let player;<br>        let enemies;<br>        let exit;<br>        let gameLog = [];<br><br>        // --- 게임 객체 클래스 ---<br>        class GameObject {<br>            constructor(x, y, char, color, name) {<br>                this.x = x;<br>                this.y = y;<br>                this.char = char;<br>                this.color = color;<br>                this.name = name;<br>            }<br>        }<br><br>        class Fighter extends GameObject {<br>            constructor(x, y, char, color, name, hp, power) {<br>                super(x, y, char, color, name);<br>                this.maxHp = hp;<br>                this.hp = hp;<br>                this.power = power;<br>            }<br><br>            takeDamage(amount) {<br>                this.hp -= amount;<br>                if (this.hp <= 0) {<br>                    logMessage(`${this.name}이(가) 쓰러졌습니다!`, '#ff4d4d');<br>                    this.char = '%'; // 시체<br>                    this.name = `${this.name}의 시체`;<br>                }<br>            }<br>            <br>            attack(target) {<br>                const damage = this.power;<br>                logMessage(`${this.name}이(가) ${target.name}을(를) 공격하여 ${damage}의 피해를 입혔습니다!`, '#ffffff');<br>                target.takeDamage(damage);<br>            }<br>        }<br><br>        // --- 맵 생성 관련 클래스 ---<br>        class Rect {<br>            constructor(x, y, w, h) {<br>                this.x1 = x;<br>                this.y1 = y;<br>                this.x2 = x + w;<br>                this.y2 = y + h;<br>            }<br><br>            center() {<br>                const centerX = Math.floor((this.x1 + this.x2) / 2);<br>                const centerY = Math.floor((this.y1 + this.y2) / 2);<br>                return { x: centerX, y: centerY };<br>            }<br><br>            intersects(other) {<br>                return (<br>                    this.x1 <= other.x2 &&<br>                    this.x2 >= other.x1 &&<br>                    this.y1 <= other.y2 &&<br>                    this.y2 >= other.y1<br>                );<br>            }<br>        }<br><br>        // --- 핵심 게임 로직 ---<br><br>        function init() {<br>            // 게임 초기화<br>            map = makeMap();<br>            gameLog = [];<br>            logMessage('던전에 오신 것을 환영합니다! 출구를 찾으세요.', '#ffa500');<br>            render();<br>            document.addEventListener('keydown', handleInput);<br>        }<br>        <br>        function makeMap() {<br>            // 1. 맵을 벽으로 채우기<br>            let newMap = Array.from({ length: MAP_HEIGHT }, () => <br>                Array(MAP_WIDTH).fill({ char: '#', color: '#555' })<br>            );<br><br>            let rooms = [];<br>            let numRooms = 0;<br>            <br>            for (let r = 0; r < MAX_ROOMS; r++) {<br>                const w = Math.floor(Math.random() * (ROOM_MAX_SIZE - ROOM_MIN_SIZE + 1)) + ROOM_MIN_SIZE;<br>                const h = Math.floor(Math.random() * (ROOM_MAX_SIZE - ROOM_MIN_SIZE + 1)) + ROOM_MIN_SIZE;<br>                const x = Math.floor(Math.random() * (MAP_WIDTH - w - 1));<br>                const y = Math.floor(Math.random() * (MAP_HEIGHT - h - 1));<br><br>                const newRoom = new Rect(x, y, w, h);<br><br>                let failed = false;<br>                for (let otherRoom of rooms) {<br>                    if (newRoom.intersects(otherRoom)) {<br>                        failed = true;<br>                        break;<br>                    }<br>                }<br>                <br>                if (!failed) {<br>                    createRoom(newMap, newRoom);<br>                    const newCenter = newRoom.center();<br><br>                    if (numRooms === 0) {<br>                        // 첫 번째 방에 플레이어 생성<br>                        player = new Fighter(newCenter.x, newCenter.y, '@', '#00ff00', '플레이어', 30, 5);<br>                    } else {<br>                        // 이전 방과 복도로 연결<br>                        const prevCenter = rooms[numRooms - 1].center();<br>                        if (Math.random() > 0.5) {<br>                            createHTunnel(newMap, prevCenter.x, newCenter.x, prevCenter.y);<br>                            createVTunnel(newMap, prevCenter.y, newCenter.y, newCenter.x);<br>                        } else {<br>                            createVTunnel(newMap, prevCenter.y, newCenter.y, prevCenter.x);<br>                            createHTunnel(newMap, prevCenter.x, newCenter.x, newCenter.y);<br>                        }<br>                    }<br>                    <br>                    rooms.push(newRoom);<br>                    numRooms++;<br>                }<br>            }<br><br>            placeObjects(rooms);<br>            // 마지막 방에 출구 생성<br>            const lastRoomCenter = rooms[rooms.length - 1].center();<br>            exit = new GameObject(lastRoomCenter.x, lastRoomCenter.y, '>', '#ff00ff', '출구');<br>            <br>            return newMap;<br>        }<br><br>        function createRoom(map, room) {<br>            for (let y = room.y1 + 1; y < room.y2; y++) {<br>                for (let x = room.x1 + 1; x < room.x2; x++) {<br>                    map[y][x] = { char: '.', color: '#aaa' };<br>                }<br>            }<br>        }<br><br>        function createHTunnel(map, x1, x2, y) {<br>            for (let x = Math.min(x1, x2); x <= Math.max(x1, x2); x++) {<br>                map[y][x] = { char: '.', color: '#aaa' };<br>            }<br>        }<br><br>        function createVTunnel(map, y1, y2, x) {<br>            for (let y = Math.min(y1, y2); y <= Math.max(y1, y2); y++) {<br>                map[y][x] = { char: '.', color: '#aaa' };<br>            }<br>        }<br><br>        function placeObjects(rooms) {<br>            enemies = [];<br>            // 첫 번째 방(플레이어 시작 위치)을 제외하고 적 배치<br>            for (let i = 1; i < rooms.length; i++) {<br>                const room = rooms[i];<br>                const numEnemies = Math.floor(Math.random() * (MAX_ENEMIES_PER_ROOM + 1));<br>                for (let j = 0; j < numEnemies; j++) {<br>                    const x = Math.floor(Math.random() * (room.x2 - room.x1 - 1)) + room.x1 + 1;<br>                    const y = Math.floor(Math.random() * (room.y2 - room.y1 - 1)) + room.y1 + 1;<br>                    <br>                    // 해당 위치에 다른 적이 없는지 확인<br>                    if (!enemies.some(e => e.x === x && e.y === y)) {<br>                       const enemy = new Fighter(x, y, 'E', '#ff6347', '적', 10, 2);<br>                       enemies.push(enemy);<br>                    }<br>                }<br>            }<br>        }<br><br>        function render() {<br>            let displayString = '';<br>            <br>            // 1. 모든 객체를 담을 임시 맵 생성<br>            let objectsMap = {};<br>            objectsMap[`${player.x},${player.y}`] = player;<br>            objectsMap[`${exit.x},${exit.y}`] = exit;<br>            enemies.forEach(enemy => {<br>                 objectsMap[`${enemy.x},${enemy.y}`] = enemy;<br>            });<br><br>            // 2. 맵 그리기<br>            for (let y = 0; y < MAP_HEIGHT; y++) {<br>                let row = '';<br>                for (let x = 0; x < MAP_WIDTH; x++) {<br>                    const key = `${x},${y}`;<br>                    if (objectsMap[key]) {<br>                        const obj = objectsMap[key];<br>                        row += `<span style="color:${obj.color}">${obj.char}</span>`;<br>                    } else {<br>                        const tile = map[y][x];<br>                        row += `<span style="color:${tile.color}">${tile.char}</span>`;<br>                    }<br>                }<br>                displayString += row + '\n';<br>            }<br>            mapDisplay.innerHTML = displayString;<br><br>            // 3. 플레이어 정보 업데이트<br>            playerStatsDisplay.innerHTML = `<br>                <li>HP: ${player.hp} / ${player.maxHp}</li><br>                <li>Power: ${player.power}</li><br>                <li>Position: (${player.x}, ${player.y})</li><br>            `;<br>            <br>            // 4. 게임 로그 업데이트<br>            gameLogDisplay.innerHTML = '';<br>            // 최신 로그 5개만 표시<br>            const logsToShow = gameLog.slice(-5).reverse(); <br>            for (const log of logsToShow) {<br>                const li = document.createElement('li');<br>                li.innerHTML = `<span style="color:${log.color}">${log.message}</span>`;<br>                gameLogDisplay.appendChild(li);<br>            }<br>        }<br><br>        function handleInput(event) {<br>            let dx = 0;<br>            let dy = 0;<br><br>            switch (event.key) {<br>                case 'ArrowUp': case 'w': dy = -1; break;<br>                case 'ArrowDown': case 's': dy = 1; break;<br>                case 'ArrowLeft': case 'a': dx = -1; break;<br>                case 'ArrowRight': case 'd': dx = 1; break;<br>                default: return; // 다른 키는 무시<br>            }<br>            <br>            movePlayer(dx, dy);<br>            gameLoop();<br>        }<br>        <br>        function movePlayer(dx, dy) {<br>            const newX = player.x + dx;<br>            const newY = player.y + dy;<br><br>            // 벽 충돌 체크<br>            if (map[newY][newX].char === '#') {<br>                logMessage('벽에 부딪혔습니다.', '#ccc');<br>                return;<br>            }<br>            <br>            // 적 충돌(공격) 체크<br>            for (const enemy of enemies) {<br>                if (enemy.x === newX && enemy.y === newY && enemy.hp > 0) {<br>                    player.attack(enemy);<br>                    return; // 공격 후 턴 종료<br>                }<br>            }<br><br>            // 이동<br>            player.x = newX;<br>            player.y = newY;<br>            <br>            // 출구 도착 체크<br>            if (player.x === exit.x && player.y === exit.y) {<br>                 winGame();<br>            }<br>        }<br>        <br>        function gameLoop() {<br>            // 적 턴<br>            enemies.forEach(enemy => {<br>                if(enemy.hp > 0) {<br>                   // 간단한 AI: 플레이어에게 접근<br>                   const dx = player.x - enemy.x;<br>                   const dy = player.y - enemy.y;<br>                   const distance = Math.sqrt(dx*dx + dy*dy);<br>                   <br>                   if (distance < 8) { // 시야 범위<br>                       const moveX = Math.sign(dx);<br>                       const moveY = Math.sign(dy);<br>                       const nextX = enemy.x + moveX;<br>                       const nextY = enemy.y + moveY;<br>                       <br>                       if (nextX === player.x && nextY === player.y) {<br>                           enemy.attack(player);<br>                       } else if (map[nextY][nextX].char !== '#') {<br>                           enemy.x = nextX;<br>                           enemy.y = nextY;<br>                       }<br>                   }<br>                }<br>            });<br>            <br>            render();<br>            <br>            // 게임 오버 체크<br>            if (player.hp <= 0) {<br>                gameOver();<br>            }<br>        }<br><br>        function logMessage(message, color = '#ffffff') {<br>             gameLog.push({ message, color });<br>        }<br><br>        function gameOver() {<br>            document.removeEventListener('keydown', handleInput);<br>            logMessage('게임 오버!', '#ff0000');<br>            render();<br>            setTimeout(() => {<br>                if(confirm("다시 시작하시겠습니까?")) {<br>                    init();<br>                }<br>            }, 500);<br>        }<br>        <br>        function winGame() {<br>            document.removeEventListener('keydown', handleInput);<br>            logMessage('축하합니다! 출구를 찾았습니다!', '#00ff00');<br>            render();<br>             setTimeout(() => {<br>                if(confirm("다음 층으로 가시겠습니까? (새 게임 시작)")) {<br>                    init();<br>                }<br>            }, 500);<br>        }<br>        <br>        // --- 게임 시작 ---<br>        init();<br><br>    </script><br></body><br></html>
