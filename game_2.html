<!DOCTYPE html><br><html lang="ko"><br><head><br>    <meta charset="UTF-8"><br>    <title>텍스트 플랫포머 게임 (v3)</title><br>    <style><br>        body {<br>            background-color: #111;<br>            color: #eee;<br>            font-family: 'Courier New', Courier, monospace;<br>            text-align: center;<br>            margin-top: 20px;<br>        }<br>        #game-container {<br>            border: 2px solid #eee;<br>            padding: 10px;<br>            display: inline-block;<br>            line-height: 1.1;<br>            font-size: 18px;<br>            white-space: pre; /* 공백과 줄바꿈을 코드 그대로 표시 */<br>        }<br>        p {<br>            color: #aaa;<br>        }<br>    </style><br></head><br><body><br><br>    <h1>텍스트 플랫포머</h1><br>    <p>@를 조종해서 움직이는 X를 피해 GOAL까지 도달하세요!</p><br>    <div id="game-container"></div><br><br>    <script><br>        const gameContainer = document.getElementById('game-container');<br><br>        // --- 게임 설정 ---<br>        const mapWidth = 60;<br>        const mapHeight = 20;<br><br>        // 캐릭터 정의<br>        const PLAYER_CHAR = '@';<br>        const PLATFORM_CHAR = '=';<br>        const ENEMY_CHAR = 'X';<br>        const EMPTY_CHAR = ' ';<br>        const GOAL_TEXT = "GOAL";<br><br>        // 물리 및 속도 설정<br>        const GRAVITY = 0.15;<br>        const JUMP_FORCE = -2.0;<br>        const MOVE_SPEED = 0.8;<br>        const ENEMY_SPEED = 0.2; // 적 이동 속도<br><br>        // --- 게임 상태 변수 ---<br>        let map = [];<br>        let enemies = []; // ★★ 적들의 정보를 담을 배열 ★★<br>        let player = {<br>            x: 5,<br>            y: 5,<br>            vx: 0,<br>            vy: 0<br>        };<br>        let isGrounded = false;<br>        let gameLoopInterval;<br><br>        /**<br>         * 무작위 플랫폼 맵을 생성하는 함수<br>         */<br>        function generateMap() {<br>            // 맵과 적 리스트 초기화<br>            map = Array(mapHeight).fill(0).map(() => Array(mapWidth).fill(EMPTY_CHAR));<br>            enemies = [];<br><br>            let currentY = mapHeight - 1;<br>            let lastPlatformX = 0;<br><br>            // 바닥 생성<br>            for (let x = 0; x < mapWidth; x++) {<br>                map[mapHeight - 1][x] = PLATFORM_CHAR;<br>            }<br><br>            // 중간 플랫폼들 생성<br>            for (let x = 0; x < mapWidth - 15; x++) { // GOAL 지점 확보를 위해 루프 범위 수정<br>                if (Math.random() > 0.95 && x > lastPlatformX + 5) {<br>                    const platformLength = Math.floor(Math.random() * 8) + 5;<br>                    const platformHeight = currentY - (Math.floor(Math.random() * 3) + 2);<br><br>                    for (let i = 0; i < platformLength && x + i < mapWidth; i++) {<br>                        map[platformHeight][x + i] = PLATFORM_CHAR;<br>                        <br>                        // 적 생성: 맵에 직접 그리지 않고, enemies 배열에 정보 추가<br>                        if (Math.random() > 0.7 && i > 1 && i < platformLength - 1) {<br>                            enemies.push({<br>                                x: x + i,<br>                                y: platformHeight - 1,<br>                                direction: 1 // 1: 오른쪽, -1: 왼쪽<br>                            });<br>                        }<br>                    }<br>                    lastPlatformX = x + platformLength;<br>                    x = lastPlatformX;<br>                }<br>            }<br>            // 시작 지점 플랫폼 생성<br>            for(let i = 0; i < 10; i++) {<br>                map[mapHeight - 4][i] = PLATFORM_CHAR;<br>            }<br><br>            // ★★ 새로운 코드: 도착 지점(GOAL) 텍스트 표시 ★★<br>            const goalY = mapHeight - 5;<br>            for (let i = 0; i < GOAL_TEXT.length; i++) {<br>                if (goalY + i < mapHeight) {<br>                    map[goalY + i][mapWidth - 2] = GOAL_TEXT[i];<br>                }<br>            }<br>            map[goalY + GOAL_TEXT.length][mapWidth - 3] = PLATFORM_CHAR;<br>            map[goalY + GOAL_TEXT.length][mapWidth - 2] = PLATFORM_CHAR;<br>            map[goalY + GOAL_TEXT.length][mapWidth - 1] = PLATFORM_CHAR;<br>        }<br>        <br>        /**<br>         * ★★ 새로운 코드: 적들의 움직임을 업데이트하는 함수 ★★<br>         */<br>        function updateEnemies() {<br>            enemies.forEach(enemy => {<br>                const nextX = enemy.x + (enemy.direction * ENEMY_SPEED);<br>                const roundedNextX = Math.round(nextX);<br><br>                // 다음 위치에 발 디딜 플랫폼이 없으면 방향 전환<br>                if (!map[enemy.y + 1] || map[enemy.y + 1][roundedNextX] !== PLATFORM_CHAR) {<br>                    enemy.direction *= -1; // 방향 반전<br>                }<br>                <br>                enemy.x += enemy.direction * ENEMY_SPEED;<br>            });<br>        }<br><br>        /**<br>         * 게임 상태를 화면에 그리는 함수<br>         */<br>        function drawGame() {<br>            let displayMap = map.map(row => [...row]);<br><br>            // 적 그리기<br>            enemies.forEach(enemy => {<br>                const enemyX = Math.round(enemy.x);<br>                const enemyY = Math.round(enemy.y);<br>                if (enemyY >= 0 && enemyY < mapHeight && enemyX >= 0 && enemyX < mapWidth) {<br>                    displayMap[enemyY][enemyX] = ENEMY_CHAR;<br>                }<br>            });<br><br>            // 플레이어 그리기<br>            const playerX = Math.round(player.x);<br>            const playerY = Math.round(player.y);<br>            if (playerY >= 0 && playerY < mapHeight && playerX >= 0 && playerX < mapWidth) {<br>                displayMap[playerY][playerX] = PLAYER_CHAR;<br>            }<br><br>            gameContainer.textContent = displayMap.map(row => row.join('')).join('\n');<br>        }<br>        <br>        /**<br>         * 게임의 핵심 로직을 업데이트하는 함수<br>         */<br>        function updateGame() {<br>            // 1. 물리 및 위치 업데이트<br>            player.vy += GRAVITY;<br>            player.x += player.vx;<br>            player.y += player.vy;<br>            isGrounded = false;<br><br>            // ★★ 적 위치 업데이트 함수 호출 ★★<br>            updateEnemies();<br>            <br>            // 2. 충돌 감지<br>            const playerRoundedX = Math.round(player.x);<br>            const playerRoundedY = Math.round(player.y);<br>            const playerBottomY = Math.ceil(player.y);<br><br>            // 바닥/플랫폼 충돌<br>            if (map[playerBottomY] && map[playerBottomY][playerRoundedX] === PLATFORM_CHAR && player.vy > 0) {<br>                player.vy = 0;<br>                player.y = playerBottomY - 1;<br>                isGrounded = true;<br>            }<br>            // 화면 왼쪽 경계<br>            if (player.x < 0) player.x = 0;<br><br>            // 적 충돌 감지 (enemies 배열을 순회하며 확인)<br>            for (const enemy of enemies) {<br>                if (Math.round(enemy.x) === playerRoundedX && Math.round(enemy.y) === playerRoundedY) {<br>                    alert('적에게 당했습니다! 다시 시작합니다.');<br>                    resetGame();<br>                    return;<br>                }<br>            }<br><br>            // 3. 게임 상태 확인<br>            // 오른쪽 끝 도달 (승리)<br>            if (player.x >= mapWidth - 3) {<br>                alert('🎉 클리어! 새로운 맵을 생성합니다.');<br>                resetGame();<br>                return;<br>            }<br>            // 바닥으로 추락 (게임 오버)<br>            if (player.y >= mapHeight) {<br>                alert('게임 오버! 다시 시작합니다.');<br>                resetGame();<br>                return;<br>            }<br><br>            // 4. 화면 다시 그리기<br>            drawGame();<br>        }<br><br>        function handleKeyDown(e) {<br>            if (e.key === 'ArrowLeft') player.vx = -MOVE_SPEED;<br>            else if (e.key === 'ArrowRight') player.vx = MOVE_SPEED;<br>            else if ((e.key === ' ' || e.key === 'Spacebar') && isGrounded) {<br>                player.vy = JUMP_FORCE;<br>                isGrounded = false;<br>            }<br>        }<br>        <br>        function handleKeyUp(e) {<br>             if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') player.vx = 0;<br>        }<br>        <br>        function resetGame() {<br>            clearInterval(gameLoopInterval);<br>            player = { x: 3, y: mapHeight - 5, vx: 0, vy: 0 };<br>            generateMap();<br>            gameLoopInterval = setInterval(updateGame, 50);<br>        }<br><br>        // --- 게임 시작 ---<br>        document.addEventListener('keydown', handleKeyDown);<br>        document.addEventListener('keyup', handleKeyUp);<br>        resetGame();<br><br>    </script><br><br></body><br></html>
