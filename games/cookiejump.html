<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쿠키 점프!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a0a00;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  #gameContainer {
    position: relative;
  }
  canvas {
    display: block;
    border: 3px solid #8B4513;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(210, 105, 30, 0.6);
    cursor: pointer;
  }
  #ui {
    display: flex;
    justify-content: space-between;
    width: 100%;
    padding: 8px 4px;
    color: #FFD700;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 1px 1px 3px #000;
  }
  #hint {
    color: #cd853f;
    font-size: 13px;
    margin-top: 6px;
    text-align: center;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div id="gameContainer">
  <div id="ui">
    <span id="scoreDisplay">점수: 0</span>
    <span id="hiDisplay">최고: 0</span>
  </div>
  <canvas id="c" width="800" height="260"></canvas>
  <div id="hint">스페이스 / ↑ / 탭 / 화면 터치 → 점프 &nbsp;|&nbsp; 더블 점프 가능!</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GROUND = H - 40;

// ── 상태
let state = 'idle'; // idle | playing | dead
let score = 0, hiScore = 0, frame = 0;
let speed = 5, speedTimer = 0;
let particles = [], obstacles = [], clouds = [];

// ── 쿠키
const cookie = {
  x: 90, y: GROUND, w: 48, h: 48,
  vy: 0, jumps: 0, maxJumps: 2,
  legFrame: 0, legTimer: 0,
  dead: false,

  jump() {
    if (this.jumps < this.maxJumps) {
      this.vy = -14;
      this.jumps++;
      spawnJumpParticles(this.x + this.w / 2, this.y + this.h);
    }
  },

  update() {
    this.vy += 0.6;
    this.y += this.vy;
    if (this.y >= GROUND) { this.y = GROUND; this.vy = 0; this.jumps = 0; }

    // leg animation
    if (this.y === GROUND) {
      this.legTimer++;
      if (this.legTimer > 6) { this.legFrame = (this.legFrame + 1) % 4; this.legTimer = 0; }
    } else {
      this.legFrame = 1;
    }
  },

  draw() {
    const cx = this.x + this.w / 2, cy = this.y + this.h / 2;
    const r = this.w / 2;
    const bounce = (this.y === GROUND) ? Math.sin(frame * 0.25) * 1.5 : 0;

    ctx.save();
    ctx.translate(cx, cy + bounce);

    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(0, r + 4, r * 0.8, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // cookie body
    const grad = ctx.createRadialGradient(-4, -4, 2, 0, 0, r);
    grad.addColorStop(0, '#FFD580');
    grad.addColorStop(0.5, '#D2691E');
    grad.addColorStop(1, '#8B4513');
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = '#6B2F0A';
    ctx.lineWidth = 2;
    ctx.stroke();

    // cookie cracks
    ctx.strokeStyle = '#8B4513';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-6, -10); ctx.lineTo(-2, -2); ctx.lineTo(-8, 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(6, -8); ctx.lineTo(10, -1); ctx.lineTo(5, 4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-4, 8); ctx.lineTo(2, 4); ctx.lineTo(6, 10);
    ctx.stroke();

    // chocolate chips
    const chips = [[-9,-8],[7,-10],[12,2],[-12,4],[0,10],[5,-1],[-5,2],[-1,-14]];
    chips.forEach(([dx, dy]) => {
      ctx.fillStyle = '#3B1A00';
      ctx.beginPath();
      ctx.ellipse(dx, dy, 3.5, 2.5, 0.3, 0, Math.PI * 2);
      ctx.fill();
    });

    // face
    if (!this.dead) {
      // eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.ellipse(-7, -4, 4, 5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(7, -4, 4, 5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#222';
      const eyeOff = this.y < GROUND - 5 ? -1 : 0;
      ctx.beginPath(); ctx.arc(-7, -3 + eyeOff, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(7, -3 + eyeOff, 2.5, 0, Math.PI * 2); ctx.fill();
      // eyebrows
      ctx.strokeStyle = '#5a2d00';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-11, -9); ctx.lineTo(-3, -10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(3, -10); ctx.lineTo(11, -9); ctx.stroke();
      // mouth
      ctx.strokeStyle = '#5a2d00';
      ctx.lineWidth = 2;
      ctx.beginPath();
      if (this.y < GROUND - 5) {
        ctx.arc(0, 5, 5, 0, Math.PI); // 점프할 때 O 모양
      } else {
        ctx.arc(0, 4, 5, 0.1 * Math.PI, 0.9 * Math.PI); // 달릴 때 웃는 입
      }
      ctx.stroke();
    } else {
      // X eyes
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 2.5;
      [[-7,-4],[7,-4]].forEach(([ex,ey]) => {
        ctx.beginPath(); ctx.moveTo(ex-3,ey-3); ctx.lineTo(ex+3,ey+3); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(ex+3,ey-3); ctx.lineTo(ex-3,ey+3); ctx.stroke();
      });
      ctx.strokeStyle = '#5a2d00';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 8, 5, Math.PI, 0); ctx.stroke();
    }

    // legs
    if (!this.dead) {
      const legAngles = [
        [[-14,0],[-10,0]],  // stand
        [[-18,-4],[-6,4]],  // step 1
        [[-14,0],[-10,0]],  // stand
        [[-6,4],[-18,-4]],  // step 2
      ];
      const [l, rr] = legAngles[this.legFrame];
      ctx.strokeStyle = '#8B4513';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      // left leg
      ctx.beginPath();
      ctx.moveTo(-6, r - 4);
      ctx.lineTo(-6 + l[0], r + 10 + l[1]);
      ctx.stroke();
      // right leg
      ctx.beginPath();
      ctx.moveTo(6, r - 4);
      ctx.lineTo(6 + rr[0], r + 10 + rr[1]);
      ctx.stroke();
    }

    ctx.restore();
  }
};

// ── 장애물 설정
const obstacleTypes = [
  {
    name: 'milk', w: 28, h: 50,
    draw(x, y) {
      ctx.fillStyle = '#eef';
      ctx.fillRect(x, y, this.w, this.h);
      ctx.strokeStyle = '#aac';
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, this.w, this.h);
      ctx.fillStyle = '#dde';
      ctx.fillRect(x + 4, y + 6, this.w - 8, 6);
      ctx.fillStyle = '#336';
      ctx.font = 'bold 9px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('MILK', x + this.w / 2, y + this.h - 12);
      ctx.fillText('🥛', x + this.w / 2, y + this.h / 2 + 4);
    }
  },
  {
    name: 'cactus', w: 34, h: 60,
    draw(x, y) {
      ctx.fillStyle = '#2d8a2d';
      ctx.fillRect(x + 10, y, 14, this.h);
      ctx.fillRect(x, y + 18, 14, 10);
      ctx.fillRect(x + 20, y + 28, 14, 10);
      ctx.fillStyle = '#1a5c1a';
      ctx.fillRect(x + 12, y + 2, 2, this.h - 4);
    }
  },
  {
    name: 'oven', w: 55, h: 55,
    draw(x, y) {
      ctx.fillStyle = '#888';
      ctx.fillRect(x, y, this.w, this.h);
      ctx.fillStyle = '#333';
      ctx.fillRect(x + 6, y + 6, this.w - 12, this.h - 22);
      ctx.fillStyle = '#ff6600';
      ctx.globalAlpha = 0.6 + 0.4 * Math.sin(frame * 0.3);
      ctx.fillRect(x + 8, y + 8, this.w - 16, this.h - 26);
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#aaa';
      ctx.fillRect(x + 6, y + this.h - 14, this.w - 12, 8);
      ctx.fillStyle = '#666';
      ctx.beginPath(); ctx.arc(x + 16, y + this.h - 10, 4, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + 39, y + this.h - 10, 4, 0, Math.PI * 2); ctx.fill();
    }
  },
  {
    name: 'choco', w: 42, h: 42,
    draw(x, y) {
      ctx.fillStyle = '#3B1F00';
      ctx.fillRect(x, y, this.w, this.h);
      for (let r = 0; r < 3; r++) for (let c = 0; c < 3; c++) {
        ctx.fillStyle = '#5C3010';
        ctx.fillRect(x + 3 + c * 13, y + 3 + r * 13, 11, 11);
      }
      ctx.strokeStyle = '#2a1000';
      ctx.lineWidth = 1;
      for (let i = 1; i < 3; i++) {
        ctx.beginPath(); ctx.moveTo(x + i * 14, y); ctx.lineTo(x + i * 14, y + this.h); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x, y + i * 14); ctx.lineTo(x + this.w, y + i * 14); ctx.stroke();
      }
    }
  },
  {
    name: 'sugar', w: 36, h: 52,
    draw(x, y) {
      ctx.fillStyle = '#f5f5dc';
      ctx.fillRect(x + 8, y, 20, this.h);
      ctx.fillStyle = '#e8e8c8';
      ctx.fillRect(x, y + 14, this.w, 10);
      ctx.fillStyle = '#ccc8a0';
      ctx.fillRect(x + 9, y + 2, 2, this.h - 4);
      ctx.fillStyle = '#666';
      ctx.font = '8px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('SUGAR', x + this.w / 2 - 1, y + this.h / 2 + 3);
    }
  },
];

function spawnObstacle() {
  const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
  const count = Math.random() < 0.3 ? 2 : 1;
  for (let i = 0; i < count; i++) {
    obstacles.push({
      x: W + 20 + i * (type.w + 8),
      y: GROUND + cookie.h - type.h,
      w: type.w, h: type.h,
      type,
    });
  }
}

function spawnJumpParticles(x, y) {
  for (let i = 0; i < 8; i++) {
    const angle = Math.PI + (Math.random() - 0.5) * Math.PI;
    const spd = 2 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 2,
      life: 1,
      color: `hsl(${30 + Math.random() * 20},80%,${50 + Math.random() * 20}%)`
    });
  }
}

function spawnCloud() {
  clouds.push({ x: W + 50, y: 20 + Math.random() * 60, scale: 0.5 + Math.random() * 0.8, speed: 0.4 + Math.random() * 0.4 });
}

// ── 배경 그리기
function drawBG() {
  // sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#4a1a00');
  sky.addColorStop(1, '#8B3A00');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // clouds
  clouds.forEach(cl => {
    ctx.save();
    ctx.translate(cl.x, cl.y);
    ctx.scale(cl.scale, cl.scale);
    ctx.fillStyle = 'rgba(255,220,170,0.25)';
    [[0,0,28],[25,-8,22],[50,0,28],[75,-5,20],[100,0,24]].forEach(([cx,cy,r]) => {
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    });
    ctx.restore();
  });

  // ground
  ctx.fillStyle = '#5C2E00';
  ctx.fillRect(0, GROUND + cookie.h, W, H - GROUND - cookie.h);

  // ground line
  ctx.strokeStyle = '#8B4513';
  ctx.lineWidth = 2;
  ctx.setLineDash([10, 8]);
  ctx.lineDashOffset = -(frame * speed) % 18;
  ctx.beginPath();
  ctx.moveTo(0, GROUND + cookie.h);
  ctx.lineTo(W, GROUND + cookie.h);
  ctx.stroke();
  ctx.setLineDash([]);

  // ground texture dots
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  for (let i = 0; i < 12; i++) {
    const tx = ((i * 67 + frame * speed * 0.5) % W);
    ctx.beginPath();
    ctx.arc(tx, GROUND + cookie.h + 10, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawOverlay(txt, sub) {
  ctx.fillStyle = 'rgba(20,8,0,0.7)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 42px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(txt, W / 2, H / 2 - 20);
  ctx.fillStyle = '#FFB86C';
  ctx.font = '20px sans-serif';
  ctx.fillText(sub, W / 2, H / 2 + 20);
}

function drawScore() {
  // score display is handled by HTML elements for readability
  document.getElementById('scoreDisplay').textContent = '점수: ' + Math.floor(score);
  document.getElementById('hiDisplay').textContent = '최고: ' + Math.floor(hiScore);
}

// ── AABB 충돌
function collides(a, b) {
  const margin = 8;
  return a.x + margin < b.x + b.w - margin &&
         a.x + a.w - margin > b.x + margin &&
         a.y + margin < b.y + b.h &&
         a.y + a.h > b.y + margin;
}

let obstacleCooldown = 0;
let cloudCooldown = 0;

function update() {
  frame++;
  speedTimer++;

  if (speedTimer % 300 === 0) speed = Math.min(speed + 0.5, 14);

  // clouds
  cloudCooldown--;
  if (cloudCooldown <= 0) { spawnCloud(); cloudCooldown = 80 + Math.random() * 120; }
  clouds.forEach(cl => { cl.x -= cl.speed; });
  clouds = clouds.filter(cl => cl.x > -200);

  cookie.update();
  score += speed * 0.06;

  // obstacles
  obstacleCooldown--;
  if (obstacleCooldown <= 0) {
    spawnObstacle();
    obstacleCooldown = Math.max(40, 90 - speed * 4) + Math.random() * 40;
  }
  obstacles.forEach(o => { o.x -= speed; });
  obstacles = obstacles.filter(o => o.x > -100);

  // collision
  const cRect = { x: cookie.x, y: cookie.y, w: cookie.w, h: cookie.h };
  for (const o of obstacles) {
    if (collides(cRect, o)) {
      state = 'dead';
      cookie.dead = true;
      if (score > hiScore) hiScore = score;
      // death particles
      for (let i = 0; i < 20; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = 3 + Math.random() * 5;
        particles.push({
          x: cookie.x + cookie.w / 2,
          y: cookie.y + cookie.h / 2,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd - 3,
          life: 1,
          color: `hsl(${30 + Math.random() * 30},90%,${40 + Math.random() * 30}%)`
        });
      }
      break;
    }
  }

  // particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.25;
    p.life -= 0.04;
  });
  particles = particles.filter(p => p.life > 0);
}

function render() {
  ctx.clearRect(0, 0, W, H);
  drawBG();

  // obstacles
  obstacles.forEach(o => {
    ctx.save();
    o.type.draw(o.x, o.y);
    ctx.restore();
    ctx.textAlign = 'left';
  });

  cookie.draw();

  // particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4 * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  if (state === 'idle') {
    drawOverlay('🍪 쿠키 점프!', '스페이스 / 화면을 눌러 시작');
  } else if (state === 'dead') {
    drawOverlay('💥 게임 오버!', '다시 하려면 스페이스 / 화면 터치');
  }

  drawScore();
}

function reset() {
  score = 0;
  frame = 0;
  speed = 5;
  speedTimer = 0;
  obstacles = [];
  particles = [];
  clouds = [];
  obstacleCooldown = 60;
  cloudCooldown = 30;
  cookie.y = GROUND;
  cookie.vy = 0;
  cookie.jumps = 0;
  cookie.dead = false;
  cookie.legFrame = 0;
  state = 'playing';
}

function handleInput() {
  if (state === 'idle' || state === 'dead') {
    reset();
  } else if (state === 'playing') {
    cookie.jump();
  }
}

// ── 입력
window.addEventListener('keydown', e => {
  if ([' ', 'ArrowUp', 'Tab'].includes(e.key)) {
    e.preventDefault();
    handleInput();
  }
});
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  handleInput();
});

// ── 게임 루프
function loop() {
  if (state === 'playing') update();
  render();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
