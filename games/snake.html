<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>스네이크 게임</title>
<style>
  html,body{height:100%;margin:0;background:#1b1f2a;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
  #wrapper{width:600px;height:600px;background:#0b0d12;position:relative;border:8px solid #222;box-shadow:0 10px 40px rgba(0,0,0,0.7);display:flex;flex-direction:column}
  #header{color:#fff;padding:15px;text-align:center;border-bottom:2px solid #333}
  #header h1{margin:0;font-size:28px;background:linear-gradient(90deg,#4ade80,#22d3ee,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  #score-board{display:flex;justify-content:space-around;margin-top:10px;font-size:16px}
  #score-board span{color:#4ade80;font-weight:bold}
  #high-score{color:#22d3ee}
  canvas{display:block;flex:1;cursor:none}
  #controls{position:absolute;bottom:15px;left:50%;transform:translateX(-50%);color:#ddd;font-family:monospace;font-size:13px;text-align:center}
  #game-over{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(11,13,18,0.95);padding:30px;border-radius:10px;border:2px solid #4ade80;text-align:center;display:none;z-index:10}
  #game-over h2{color:#4ade80;margin:0 0 15px 0;font-size:32px}
  #game-over p{color:#fff;margin:10px 0;font-size:18px}
  #game-over button{background:linear-gradient(135deg,#4ade80,#22d3ee);border:none;padding:12px 30px;font-size:16px;color:#0b0d12;font-weight:bold;border-radius:5px;cursor:pointer;margin-top:15px;transition:transform 0.2s}
  #game-over button:hover{transform:scale(1.05)}
  #game-over button:active{transform:scale(0.95)}
  #instructions{position:absolute;top:15px;right:15px;color:#888;font-size:11px;text-align:right;line-height:1.6}
</style>
</head>
<body>
<div id="wrapper">
  <div id="header">
    <h1>🐍 스네이크 게임</h1>
    <div id="score-board">
      <div>점수: <span id="score">0</span></div>
      <div>최고점수: <span id="high-score">0</span></div>
    </div>
  </div>
  <canvas id="game" width="584" height="500"></canvas>
  <div id="instructions">방향키로 조작<br/>스페이스바: 일시정지</div>
  <div id="controls">← ↑ → ↓ : 이동</div>
  <div id="game-over">
    <h2>게임 오버!</h2>
    <p>최종 점수: <span id="final-score">0</span></p>
    <p id="new-record" style="color:#4ade80;display:none">🎉 새로운 최고 기록!</p>
    <button id="restart-btn">다시 시작</button>
  </div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('high-score');
const finalScoreEl = document.getElementById('final-score');
const gameOverEl = document.getElementById('game-over');
const restartBtn = document.getElementById('restart-btn');
const newRecordEl = document.getElementById('new-record');

const GRID_SIZE = 20;
const GRID_WIDTH = Math.floor(W / GRID_SIZE);
const GRID_HEIGHT = Math.floor(H / GRID_SIZE);

let snake = [{x: 10, y: 10}];
let direction = {x: 1, y: 0};
let nextDirection = {x: 1, y: 0};
let food = {x: 15, y: 15};
let score = 0;
let highScore = localStorage.getItem('snakeHighScore') || 0;
let gameRunning = true;
let paused = false;
let gameLoop;

highScoreEl.textContent = highScore;

const keys = {};
window.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();
  keys[key] = true;
  
  if (key === ' ') {
    paused = !paused;
    if (!paused && gameRunning) {
      gameLoop();
    }
    return;
  }
  
  if (!paused && gameRunning) {
    if (key === 'arrowup' || key === 'w') {
      if (direction.y === 0) nextDirection = {x: 0, y: -1};
    } else if (key === 'arrowdown' || key === 's') {
      if (direction.y === 0) nextDirection = {x: 0, y: 1};
    } else if (key === 'arrowleft' || key === 'a') {
      if (direction.x === 0) nextDirection = {x: -1, y: 0};
    } else if (key === 'arrowright' || key === 'd') {
      if (direction.x === 0) nextDirection = {x: 1, y: 0};
    }
  }
});

restartBtn.addEventListener('click', () => {
  initGame();
  gameOverEl.style.display = 'none';
});

function randomFood() {
  food = {
    x: Math.floor(Math.random() * GRID_WIDTH),
    y: Math.floor(Math.random() * GRID_HEIGHT)
  };
  // 음식이 뱀 몸체 위에 생성되지 않도록 확인
  for (const segment of snake) {
    if (segment.x === food.x && segment.y === food.y) {
      randomFood();
      return;
    }
  }
}

function initGame() {
  snake = [{x: 10, y: 10}];
  direction = {x: 1, y: 0};
  nextDirection = {x: 1, y: 0};
  score = 0;
  gameRunning = true;
  paused = false;
  scoreEl.textContent = score;
  randomFood();
  render();
}

function update() {
  if (!gameRunning || paused) return;
  
  direction = {...nextDirection};
  
  const head = {
    x: snake[0].x + direction.x,
    y: snake[0].y + direction.y
  };
  
  // 벽 충돌 체크
  if (head.x < 0 || head.x >= GRID_WIDTH || head.y < 0 || head.y >= GRID_HEIGHT) {
    gameOver();
    return;
  }
  
  // 자기 자신과 충돌 체크
  for (const segment of snake) {
    if (head.x === segment.x && head.y === segment.y) {
      gameOver();
      return;
    }
  }
  
  snake.unshift(head);
  
  // 음식 먹기
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = score;
    randomFood();
  } else {
    snake.pop();
  }
}

function gameOver() {
  gameRunning = false;
  finalScoreEl.textContent = score;
  
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('snakeHighScore', highScore);
    highScoreEl.textContent = highScore;
    newRecordEl.style.display = 'block';
  } else {
    newRecordEl.style.display = 'none';
  }
  
  gameOverEl.style.display = 'block';
}

function render() {
  // 배경
  ctx.fillStyle = '#0b0d12';
  ctx.fillRect(0, 0, W, H);
  
  // 그리드 (옵션)
  ctx.strokeStyle = '#1a1a2e';
  ctx.lineWidth = 1;
  for (let x = 0; x <= GRID_WIDTH; x++) {
    ctx.beginPath();
    ctx.moveTo(x * GRID_SIZE, 0);
    ctx.lineTo(x * GRID_SIZE, H);
    ctx.stroke();
  }
  for (let y = 0; y <= GRID_HEIGHT; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * GRID_SIZE);
    ctx.lineTo(W, y * GRID_SIZE);
    ctx.stroke();
  }
  
  // 음식
  ctx.fillStyle = '#ef4444';
  ctx.beginPath();
  ctx.arc(
    food.x * GRID_SIZE + GRID_SIZE / 2,
    food.y * GRID_SIZE + GRID_SIZE / 2,
    GRID_SIZE / 2 - 2,
    0,
    Math.PI * 2
  );
  ctx.fill();
  
  // 뱀
  snake.forEach((segment, index) => {
    const x = segment.x * GRID_SIZE;
    const y = segment.y * GRID_SIZE;
    
    if (index === 0) {
      // 머리
      const gradient = ctx.createLinearGradient(x, y, x + GRID_SIZE, y + GRID_SIZE);
      gradient.addColorStop(0, '#4ade80');
      gradient.addColorStop(1, '#22d3ee');
      ctx.fillStyle = gradient;
    } else {
      // 몸체
      const intensity = 1 - (index / snake.length) * 0.5;
      ctx.fillStyle = `rgba(74, 222, 128, ${intensity})`;
    }
    
    ctx.fillRect(x + 1, y + 1, GRID_SIZE - 2, GRID_SIZE - 2);
    
    // 머리에 눈 추가
    if (index === 0) {
      ctx.fillStyle = '#0b0d12';
      const eyeSize = 3;
      const eyeOffset = 5;
      if (direction.x === 1) {
        ctx.fillRect(x + GRID_SIZE - eyeOffset - eyeSize, y + eyeOffset, eyeSize, eyeSize);
        ctx.fillRect(x + GRID_SIZE - eyeOffset - eyeSize, y + GRID_SIZE - eyeOffset - eyeSize, eyeSize, eyeSize);
      } else if (direction.x === -1) {
        ctx.fillRect(x + eyeOffset, y + eyeOffset, eyeSize, eyeSize);
        ctx.fillRect(x + eyeOffset, y + GRID_SIZE - eyeOffset - eyeSize, eyeSize, eyeSize);
      } else if (direction.y === -1) {
        ctx.fillRect(x + eyeOffset, y + eyeOffset, eyeSize, eyeSize);
        ctx.fillRect(x + GRID_SIZE - eyeOffset - eyeSize, y + eyeOffset, eyeSize, eyeSize);
      } else if (direction.y === 1) {
        ctx.fillRect(x + eyeOffset, y + GRID_SIZE - eyeOffset - eyeSize, eyeSize, eyeSize);
        ctx.fillRect(x + GRID_SIZE - eyeOffset - eyeSize, y + GRID_SIZE - eyeOffset - eyeSize, eyeSize, eyeSize);
      }
    }
  });
  
  // 일시정지 표시
  if (paused && gameRunning) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 32px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('일시정지', W / 2, H / 2);
  }
}

function loop() {
  update();
  render();
  if (gameRunning && !paused) {
    setTimeout(() => {
      gameLoop = requestAnimationFrame(loop);
    }, 150);
  }
}

initGame();
gameLoop = requestAnimationFrame(loop);
</script>
</body>
</html>
