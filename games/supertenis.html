<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Super Tennis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }
    h1 {
      color: #e0e0e0;
      font-size: 2rem;
      letter-spacing: 4px;
      margin-bottom: 12px;
      text-shadow: 0 0 20px #4ecdc4;
    }
    #scoreboard {
      display: flex;
      gap: 60px;
      margin-bottom: 10px;
      color: #fff;
      font-size: 1.1rem;
    }
    .score-panel {
      text-align: center;
    }
    .score-label {
      color: #aaa;
      font-size: 0.8rem;
      letter-spacing: 2px;
    }
    .score-value {
      font-size: 2.5rem;
      font-weight: bold;
      color: #4ecdc4;
      text-shadow: 0 0 10px #4ecdc4;
    }
    .set-score {
      font-size: 0.9rem;
      color: #ffd700;
    }
    canvas {
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(78, 205, 196, 0.3);
      cursor: none;
    }
    #info {
      color: #888;
      font-size: 0.75rem;
      margin-top: 10px;
      letter-spacing: 1px;
    }
    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      pointer-events: none;
    }
    #overlay-msg {
      font-size: 2.5rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 30px #4ecdc4, 0 0 60px #4ecdc4;
      letter-spacing: 3px;
    }
    #overlay-sub {
      font-size: 1rem;
      color: #aaa;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <h1>🎾 SUPER TENNIS</h1>
  <div id="scoreboard">
    <div class="score-panel">
      <div class="score-label">AI</div>
      <div class="score-value" id="ai-score">0</div>
      <div class="set-score" id="ai-sets">Sets: 0</div>
    </div>
    <div style="color:#444;font-size:2rem;align-self:center;">VS</div>
    <div class="score-panel">
      <div class="score-label">YOU</div>
      <div class="score-value" id="player-score">0</div>
      <div class="set-score" id="player-sets">Sets: 0</div>
    </div>
  </div>
  <canvas id="court"></canvas>
  <div id="info">마우스 또는 ← → 방향키로 이동 · 스페이스바로 시작</div>

  <script>
    const canvas = document.getElementById('court');
    const ctx = canvas.getContext('2d');

    const W = 600, H = 500;
    canvas.width = W;
    canvas.height = H;

    const PADDLE_W = 90, PADDLE_H = 12, PADDLE_SPEED = 7;
    const BALL_R = 9;
    const NET_Y = H / 2;

    // Tennis score labels
    const POINT_LABELS = ['0', '15', '30', '40'];

    let state = 'waiting'; // waiting, playing, point, gameover
    let mouseX = W / 2;

    let aiSets = 0, playerSets = 0;
    let aiGames = 0, playerGames = 0;
    let aiPoints = 0, playerPoints = 0;

    let keys = {};

    const player = {
      x: W / 2 - PADDLE_W / 2,
      y: H - 30,
      w: PADDLE_W,
      h: PADDLE_H,
      color: '#4ecdc4'
    };

    const ai = {
      x: W / 2 - PADDLE_W / 2,
      y: 18,
      w: PADDLE_W,
      h: PADDLE_H,
      color: '#ff6b6b'
    };

    const ball = {
      x: W / 2, y: H / 2,
      vx: 0, vy: 0,
      r: BALL_R,
      spinning: 0
    };

    let particles = [];
    let pointMsg = '';
    let pointTimer = 0;
    let aiDifficulty = 0.06; // 0..1 tracking speed
    let rallyCnt = 0;

    function resetBall(serveDir = 1) {
      ball.x = W / 2;
      ball.y = H / 2;
      const angle = (Math.random() * 60 - 30) * Math.PI / 180;
      const speed = 4.5 + rallyCnt * 0.05;
      ball.vx = Math.sin(angle) * speed;
      ball.vy = serveDir * Math.cos(angle) * speed;
      ball.spinning = 0;
      rallyCnt = 0;
    }

    function spawnParticles(x, y, color) {
      for (let i = 0; i < 18; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = Math.random() * 4 + 1;
        particles.push({
          x, y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s,
          life: 1,
          color,
          r: Math.random() * 4 + 1
        });
      }
    }

    function updateParticles() {
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
        p.life -= 0.035;
        p.vx *= 0.97;
      });
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    function drawCourt() {
      // Background: clay court
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#2d5a1b');
      grad.addColorStop(0.48, '#2d6b1a');
      grad.addColorStop(0.52, '#3a7a20');
      grad.addColorStop(1, '#2d5a1b');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 1.5;

      // Court boundary
      const mx = 40, my = 20;
      ctx.strokeRect(mx, my, W - mx * 2, H - my * 2);

      // Service boxes - top half
      ctx.beginPath();
      ctx.moveTo(W / 2, my);
      ctx.lineTo(W / 2, NET_Y);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(mx, my + (NET_Y - my) * 0.5);
      ctx.lineTo(W - mx, my + (NET_Y - my) * 0.5);
      ctx.stroke();

      // Service boxes - bottom half
      ctx.beginPath();
      ctx.moveTo(W / 2, NET_Y);
      ctx.lineTo(W / 2, H - my);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(mx, NET_Y + (H - my - NET_Y) * 0.5);
      ctx.lineTo(W - mx, NET_Y + (H - my - NET_Y) * 0.5);
      ctx.stroke();

      // Net
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, NET_Y);
      ctx.lineTo(W, NET_Y);
      ctx.stroke();

      // Net posts
      ctx.fillStyle = '#ddd';
      ctx.fillRect(-4, NET_Y - 10, 8, 20);
      ctx.fillRect(W - 4, NET_Y - 10, 8, 20);

      // Net mesh lines
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 0.5;
      for (let nx = 10; nx < W; nx += 14) {
        ctx.beginPath();
        ctx.moveTo(nx, NET_Y - 4);
        ctx.lineTo(nx, NET_Y + 4);
        ctx.stroke();
      }

      // Center mark
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(W / 2 - 6, my);
      ctx.lineTo(W / 2 + 6, my);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(W / 2 - 6, H - my);
      ctx.lineTo(W / 2 + 6, H - my);
      ctx.stroke();
    }

    function drawPaddle(p, label) {
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 15;
      const rx = 6;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.roundRect(p.x, p.y, p.w, p.h, rx);
      ctx.fill();
      ctx.shadowBlur = 0;

      // handle/grip lines
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 2;
      for (let i = 1; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(p.x + p.w * i / 4, p.y + 2);
        ctx.lineTo(p.x + p.w * i / 4, p.y + p.h - 2);
        ctx.stroke();
      }
    }

    function drawBall() {
      ctx.shadowColor = '#ffe066';
      ctx.shadowBlur = 20;
      const grad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, ball.r);
      grad.addColorStop(0, '#fff');
      grad.addColorStop(0.4, '#d4f542');
      grad.addColorStop(1, '#8fb500');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fill();

      // seam
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r * 0.6, ball.spinning, ball.spinning + Math.PI);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    function drawHUD() {
      // Game score display on court
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      const aiLabel = POINT_LABELS[aiPoints] || 'ADV';
      const plLabel = POINT_LABELS[playerPoints] || 'ADV';
      ctx.fillText(`${aiGames} - ${playerGames}  (${aiLabel} : ${plLabel})`, W / 2, H / 2 - 14);

      if (state === 'waiting') {
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 36px Arial';
        ctx.fillText('SUPER TENNIS', W / 2, H / 2 - 20);
        ctx.font = '16px Arial';
        ctx.fillStyle = '#aaa';
        ctx.fillText('스페이스바 또는 클릭으로 시작', W / 2, H / 2 + 20);
      }

      if (state === 'point' && pointTimer > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(W / 2 - 120, H / 2 - 35, 240, 60);
        ctx.font = 'bold 26px Arial';
        ctx.fillStyle = '#fff';
        ctx.fillText(pointMsg, W / 2, H / 2 + 8);
      }

      if (state === 'gameover') {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, W, H);
        ctx.font = 'bold 40px Arial';
        ctx.fillStyle = '#ffd700';
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 20;
        ctx.fillText(pointMsg, W / 2, H / 2 - 20);
        ctx.shadowBlur = 0;
        ctx.font = '18px Arial';
        ctx.fillStyle = '#ccc';
        ctx.fillText('스페이스바로 다시 시작', W / 2, H / 2 + 30);
      }
    }

    function updateScoreboard() {
      document.getElementById('ai-score').textContent = aiGames;
      document.getElementById('player-score').textContent = playerGames;
      document.getElementById('ai-sets').textContent = `Sets: ${aiSets}`;
      document.getElementById('player-sets').textContent = `Sets: ${playerSets}`;
    }

    function awardPoint(winner) {
      rallyCnt = 0;
      if (winner === 'player') {
        spawnParticles(ball.x, ball.y, '#4ecdc4');
        playerPoints++;
      } else {
        spawnParticles(ball.x, ball.y, '#ff6b6b');
        aiPoints++;
      }

      // Deuce logic
      if (aiPoints >= 3 && playerPoints >= 3) {
        if (Math.abs(aiPoints - playerPoints) >= 2) {
          const gameWinner = aiPoints > playerPoints ? 'ai' : 'player';
          awardGame(gameWinner);
          return;
        }
        if (aiPoints === playerPoints) {
          pointMsg = 'DEUCE';
        } else {
          pointMsg = aiPoints > playerPoints ? 'ADVANTAGE AI' : 'ADVANTAGE YOU';
        }
      } else if (aiPoints >= 4 || playerPoints >= 4) {
        const gameWinner = aiPoints > playerPoints ? 'ai' : 'player';
        awardGame(gameWinner);
        return;
      } else if (aiPoints >= 3 && playerPoints < 3) {
        awardGame('ai');
        return;
      } else if (playerPoints >= 3 && aiPoints < 3) {
        awardGame('player');
        return;
      } else {
        pointMsg = winner === 'player' ? '✓ POINT!' : '✗ POINT';
      }

      state = 'point';
      pointTimer = 90;
    }

    function awardGame(winner) {
      if (winner === 'player') {
        playerGames++;
        pointMsg = '🎾 GAME!';
      } else {
        aiGames++;
        pointMsg = 'AI GAME';
      }
      aiPoints = 0; playerPoints = 0;

      // Check set (first to 6, must win by 2; tiebreak at 6-6)
      if (playerGames >= 6 && playerGames - aiGames >= 2) {
        playerSets++;
        aiGames = 0; playerGames = 0;
        pointMsg = '🏆 SET WIN!';
      } else if (aiGames >= 6 && aiGames - playerGames >= 2) {
        aiSets++;
        aiGames = 0; playerGames = 0;
        pointMsg = 'AI SET WIN';
      } else if (playerGames === 7 && aiGames === 6) {
        playerSets++;
        aiGames = 0; playerGames = 0;
        pointMsg = '🏆 TIEBREAK!';
      } else if (aiGames === 7 && playerGames === 6) {
        aiSets++;
        aiGames = 0; playerGames = 0;
        pointMsg = 'AI TIEBREAK';
      }

      updateScoreboard();

      if (playerSets >= 2) {
        pointMsg = '🏆 YOU WIN MATCH!';
        state = 'gameover';
        return;
      }
      if (aiSets >= 2) {
        pointMsg = 'AI WINS MATCH';
        state = 'gameover';
        return;
      }

      state = 'point';
      pointTimer = 120;
    }

    function moveAI() {
      const targetX = ball.x - ai.w / 2;
      const diff = targetX - ai.x;
      // AI difficulty: track ball with some error
      const aiSpeed = PADDLE_SPEED * (0.5 + aiDifficulty);
      if (Math.abs(diff) > 1) {
        ai.x += Math.sign(diff) * Math.min(Math.abs(diff), aiSpeed);
      }
      ai.x = Math.max(0, Math.min(W - ai.w, ai.x));
    }

    function update() {
      if (state === 'point') {
        pointTimer--;
        if (pointTimer <= 0) {
          state = 'playing';
          resetBall(Math.random() < 0.5 ? 1 : -1);
        }
        updateParticles();
        return;
      }
      if (state !== 'playing') return;

      // Player movement
      if (keys['ArrowLeft']) player.x -= PADDLE_SPEED;
      if (keys['ArrowRight']) player.x += PADDLE_SPEED;
      player.x = Math.max(0, Math.min(W - player.w, player.x));

      // Mouse control
      const target = mouseX - player.w / 2;
      const md = target - player.x;
      if (Math.abs(md) > 1) player.x += Math.sign(md) * Math.min(Math.abs(md), PADDLE_SPEED * 1.5);
      player.x = Math.max(0, Math.min(W - player.w, player.x));

      moveAI();

      // Ball movement
      ball.x += ball.vx;
      ball.y += ball.vy;
      ball.spinning += 0.12;

      // Wall bounce
      if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
      if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); }

      // Net collision
      if (Math.abs(ball.y - NET_Y) < ball.r + 2 && Math.abs(ball.vy) < 5) {
        ball.vy = -Math.abs(ball.vy) * 1.05;
        spawnParticles(ball.x, NET_Y, '#ffffff');
      }

      // Player paddle collision
      if (
        ball.vy > 0 &&
        ball.y + ball.r >= player.y &&
        ball.y + ball.r <= player.y + player.h + 4 &&
        ball.x >= player.x - ball.r &&
        ball.x <= player.x + player.w + ball.r
      ) {
        const hitPos = (ball.x - player.x) / player.w; // 0..1
        const angle = (hitPos - 0.5) * 90 * Math.PI / 180;
        const speed = Math.min(Math.sqrt(ball.vx ** 2 + ball.vy ** 2) * 1.04, 14);
        ball.vx = Math.sin(angle) * speed;
        ball.vy = -Math.abs(Math.cos(angle) * speed);
        ball.y = player.y - ball.r;
        rallyCnt++;
        aiDifficulty = Math.min(0.95, 0.06 + rallyCnt * 0.015);
        spawnParticles(ball.x, ball.y, '#4ecdc4');
      }

      // AI paddle collision
      if (
        ball.vy < 0 &&
        ball.y - ball.r <= ai.y + ai.h &&
        ball.y - ball.r >= ai.y - 4 &&
        ball.x >= ai.x - ball.r &&
        ball.x <= ai.x + ai.w + ball.r
      ) {
        const hitPos = (ball.x - ai.x) / ai.w;
        const angle = (hitPos - 0.5) * 80 * Math.PI / 180;
        const speed = Math.min(Math.sqrt(ball.vx ** 2 + ball.vy ** 2) * 1.04, 14);
        ball.vx = Math.sin(angle) * speed;
        ball.vy = Math.abs(Math.cos(angle) * speed);
        ball.y = ai.y + ai.h + ball.r;
        rallyCnt++;
        spawnParticles(ball.x, ball.y, '#ff6b6b');
      }

      // Scoring
      if (ball.y > H + 10) { awardPoint('ai'); }
      if (ball.y < -10)    { awardPoint('player'); }

      updateParticles();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      drawCourt();
      drawParticles();
      drawPaddle(ai);
      drawPaddle(player);
      if (state !== 'waiting') drawBall();
      drawHUD();
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // Controls
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouseX = e.clientX - rect.left;
    });

    canvas.addEventListener('click', () => {
      if (state === 'waiting' || state === 'gameover') startGame();
    });

    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === ' ') {
        e.preventDefault();
        if (state === 'waiting' || state === 'gameover') startGame();
      }
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    function startGame() {
      aiSets = 0; playerSets = 0;
      aiGames = 0; playerGames = 0;
      aiPoints = 0; playerPoints = 0;
      aiDifficulty = 0.06;
      rallyCnt = 0;
      particles = [];
      updateScoreboard();
      state = 'playing';
      resetBall(1);
    }

    gameLoop();
  </script>
</body>
</html>
