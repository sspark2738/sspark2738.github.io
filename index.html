<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMILECOOKIE OFFICIAL SITE</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <style>
        /* 페이지 전체 스타일 */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #121212; /* 더 깊은 어두운 배경색 */
            font-family: 'Pretendard', sans-serif;
            color: white;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden; /* 불필요한 스크롤 방지 */
        }

        .container {
            text-align: center;
        }

        /* 그라데이션 텍스트 스타일 */
        .gradient-text {
            background: linear-gradient(60deg, #3B82F6, #A855F7, #EC4899, #F59E0B, #bd6e00, #ff0000, #009632);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            font-size: clamp(2.5rem, 12vw, 6rem); /* 반응형 폰트 크기 */
            font-weight: 900;
            min-height: 1.5em; /* 텍스트 변경 시 레이아웃 흔들림 방지 */
            transition: opacity 0.7s ease-in-out; /* 부드러운 전환 효과 */
            animation: gradient-animation 12s ease infinite;
        }

        /* 그라데이션 배경 애니메이션 */
        @keyframes gradient-animation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 현재 언어 표시 스타일 */
        .language-info {
            font-size: 1.2rem;
            color: #a0a0a0;
            margin-top: 15px;
            min-height: 1.2em; /* 높이 고정 */
            transition: opacity 0.7s ease-in-out;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 인사말이 표시될 공간 -->
        <h1 id="greeting-text" class="gradient-text"></h1>
        <!-- 현재 언어가 표시될 공간 -->
        <p id="language-display" class="language-info"></p>

        <p style="color:rgb(120, 95, 50);font-weight: bold;">We are renewing the site</p>
        <p style="color:rgb(120, 95, 50)">Contact : contact@smilecookie.com</p>
        <p style="color:rgb(120, 95, 50)">©2025 SMILECOOKIE INC. All Rights Reserved.</p>

    </div>

    <script>
        const greetingElement = document.getElementById('greeting-text');
        const languageElement = document.getElementById('language-display');

        // 인사말과 언어 정보를 담고 있는 배열
        const greetings = [
            { greeting: '안녕하세요!', language: '한국어' },
            { greeting: 'Hello!', language: 'English' },
            { greeting: 'こんにちは!', language: '日本語' },
            { greeting: '¡Hola!', language: 'Español' },
            { greeting: 'Bonjour!', language: 'Français' },
            { greeting: 'Guten Tag!', language: 'Deutsch' },
            { greeting: '你好!', language: '中文' },
            { greeting: 'Здравствуйте!', language: 'Русский' },
            { greeting: 'مرحبا!', language: 'العربية' },
            { greeting: 'नमस्ते!', language: 'हिन्दी' }
        ];
        let currentGreetingIndex = 0;

        // 다음 언어로 텍스트를 업데이트하는 함수
        function updateGreeting() {
            // 현재 텍스트를 부드럽게 사라지게 함
            greetingElement.style.opacity = 0;
            languageElement.style.opacity = 0;

            // 0.7초 후 (사라지는 애니메이션이 끝난 후) 텍스트를 교체하고 나타나게 함
            setTimeout(() => {
                // 배열에서 현재 순서의 인사말 객체를 가져옴
                const currentGreeting = greetings[currentGreetingIndex];

                // 화면의 텍스트를 업데이트
                greetingElement.textContent = currentGreeting.greeting;
                languageElement.textContent = currentGreeting.language;

                // 텍스트를 다시 보이게 함
                greetingElement.style.opacity = 1;
                //languageElement.style.opacity = 1;
                
                // 다음 순서를 위해 인덱스 업데이트 (배열 끝에 도달하면 처음으로 돌아감)
                currentGreetingIndex = (currentGreetingIndex + 1) % greetings.length;
            }, 700);
        }

        // 페이지 로드 시 즉시 첫 인사말을 표시
        updateGreeting();

        // 5초(5000ms)마다 updateGreeting 함수를 반복 실행
        setInterval(updateGreeting, 5000);
    </script>
</body>
</html>
