<!DOCTYPE html><br><html lang="ko"><br><head><br>    <meta charset="UTF-8"><br>    <meta name="viewport" content="width=device-width, initial-scale=1.0"><br>    <title>전 세계의 인사말</title><br>    <style><br>        /* 페이지 기본 스타일 */<br>        body {<br>            margin: 0;<br>            height: 100vh;<br>            /* 밤하늘처럼 깊고 어두운 배경색 */<br>            background-color: #0c0c1e;<br>            color: white;<br>            font-family: 'Arial', sans-serif;<br>            overflow: hidden; /* 스크롤바가 생기지 않도록 함 */<br>        }<br><br>        /* 모든 인사말을 담을 컨테이너 */<br>        #greetings-container {<br>            position: relative;<br>            width: 100%;<br>            height: 100%;<br>        }<br><br>        /* 개별 인사말 텍스트 스타일 */<br>        .greeting {<br>            position: absolute; /* 절대 위치로 자유롭게 배치 */<br>            white-space: nowrap; /* 줄바꿈 방지 */<br>            user-select: none; /* 텍스트 선택 방지 */<br>            <br>            /* 다채로운 그라데이션을 모든 텍스트에 적용 */<br>            background: linear-gradient(45deg, #ff7e5f, #feb47b, #86A8E7, #91EAE4, #7f7fd5);<br>            -webkit-background-clip: text;<br>            background-clip: text;<br>            -webkit-text-fill-color: transparent;<br>            color: transparent;<br><br>            /* 부드럽게 떠다니는 애니메이션 효과 */<br>            animation: float 20s ease-in-out infinite;<br>        }<br><br>        /* 떠다니는 효과를 위한 키프레임 애니메이션 */<br>        @keyframes float {<br>            0% { transform: translateY(0px) translateX(0px); }<br>            25% { transform: translateY(-15px) translateX(10px); }<br>            50% { transform: translateY(10px) translateX(-15px); }<br>            75% { transform: translateY(-10px) translateX(20px); }<br>            100% { transform: translateY(0px) translateX(0px); }<br>        }<br>    </style><br></head><br><body><br><br>    <div id="greetings-container"></div><br><br>    <script><br>        const container = document.getElementById('greetings-container');<br><br>        // 최대한 많은 '안녕하세요'를 배열에 저장합니다.<br>        const greetings = [<br>            '안녕하세요', 'Hello', 'こんにちは', '你好', '¡Hola!', 'Bonjour', 'Guten Tag', 'Здравствуйте', 'مرحبا', <br>            'नमस्ते', 'Olá', 'Ciao', 'Hallo', 'Hej', 'Ahoj', 'Merhaba', 'Szia', 'สวัสดี', 'שלום', 'Γειά σας', <br>            'Cześć', 'Salut', 'Hei', 'Sveiki', 'Tere', 'Zdravo', 'Kamusta', 'Xin chào', 'Jambo', 'Përshëndetje',<br>            'Sannu', 'Salam', 'Shwmae', 'Hodi', 'Demat', 'Saluton', 'Aloha', 'Ia Orana', 'Bula', 'Mālō e lelei',<br>            'Talofa', 'Kia Ora', 'Bongu', 'Dia dhuit', 'Salama', 'Kaixo', 'Pershendetje', 'Ola', 'Sawubona',<br>            'Selam', 'Nǐ hǎo', 'Sabaidee', 'Mingalaba', 'Hyālō', 'Vaṇakkam', 'Namaskāraṁ', 'S̄wạs̄dī',<br>            'Bare՛v', 'Gamarjoba', 'Sälemetsiz be', 'Vitayu', 'Hallå', 'Čau', 'Moïen', 'Hyllo', 'Kumusta',<br><br>            // 더 많은 언어 추가<br>            'Hallå', 'Sveiki', 'Tere', 'Moikka', 'Hoi', 'Grüezi', 'S’w mae', 'Sziasztok', 'Bok', 'Alo',<br>            'Ola', 'Pryvit', 'Konnichiwa', 'Annyeonghaseyo', 'Zdravstvuyte', 'Shalom', 'Marhaban', 'Namaste',<br>            'Jambo', 'Sawubona', 'Olá', 'Ciao', 'Merhaba', 'S̄wạs̄dī', 'Xin chào', 'Kamusta', 'Selam',<br>            'Salut', 'Hej', 'Hallo', 'Hei', 'Ahoj', 'Cześć', 'Szia', 'Tere', 'Sveiki', 'Labas', 'Zdravo'<br>        ];<br><br>        // 배열에 있는 모든 인사말을 화면에 뿌립니다.<br>        greetings.forEach(text => {<br>            const greetingElement = document.createElement('span');<br>            greetingElement.className = 'greeting';<br>            greetingElement.textContent = text;<br><br>            // 각 텍스트의 스타일을 무작위로 설정합니다.<br>            greetingElement.style.top = `${Math.random() * 95}%`; // Y 위치<br>            greetingElement.style.left = `${Math.random() * 95}%`; // X 위치<br>            greetingElement.style.fontSize = `${Math.random() * 3 + 0.8}rem`; // 글자 크기<br>            greetingElement.style.opacity = Math.random() * 0.7 + 0.3; // 투명도<br>            <br>            // 애니메이션 시작 시간과 재생 시간을 무작위로 설정하여 자연스럽게 만듭니다.<br>            greetingElement.style.animationDelay = `${Math.random() * 10}s`;<br>            greetingElement.style.animationDuration = `${Math.random() * 15 + 15}s`;<br><br>            container.appendChild(greetingElement);<br>        });<br>    </script><br><br></body><br></html><br>
